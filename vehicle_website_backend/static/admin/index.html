<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Vehicle Backend</title>
  <style>
    /* ──────────── Reset & Base ──────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    a { color: #4361ee; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ──────────── Login Page ──────────── */
    .login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .login-card p.subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .login-card .field {
      margin-bottom: 20px;
    }
    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .login-card input:focus {
      border-color: #4361ee;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
    }
    .login-card .btn-primary {
      width: 100%;
      padding: 14px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .login-card .btn-primary:hover { background: #3651d4; }
    .login-card .btn-primary:active { transform: scale(0.98); }
    .login-card .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      background: #fee2e2;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }

    /* ──────────── Dashboard Layout ──────────── */
    .dashboard-page { display: none; }
    .dashboard-page.active { display: block; }

    /* Top Nav */
    .topnav {
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .topnav .brand {
      font-size: 20px;
      font-weight: 700;
    }
    .topnav .brand span { color: #a78bfa; }
    .topnav .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topnav .user-info .email {
      font-size: 14px;
      color: #c4b5fd;
    }
    .topnav .btn-logout {
      padding: 8px 20px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .topnav .btn-logout:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.5);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
    }
    .tabs .tab {
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tabs .tab:hover { color: #374151; }
    .tabs .tab.active {
      color: #4361ee;
      border-bottom-color: #4361ee;
    }

    /* Content area */
    .content {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Header with actions */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .panel-header h2 {
      font-size: 22px;
      font-weight: 700;
    }
    .panel-header .badge {
      background: #e0e7ff;
      color: #4361ee;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-left: 8px;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #4361ee; color: #fff; }
    .btn-primary:hover { background: #3651d4; }
    .btn-success { background: #059669; color: #fff; }
    .btn-success:hover { background: #047857; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-warning { background: #d97706; color: #fff; }
    .btn-warning:hover { background: #b45309; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #d1d5db;
      color: #374151;
    }
    .btn-outline:hover { background: #f3f4f6; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* Table */
    .table-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #f9fafb;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
    }
    td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: middle;
    }
    tr:hover td { background: #fafbff; }
    td.actions {
      white-space: nowrap;
      display: flex;
      gap: 6px;
    }
    .badge-admin {
      background: #fef3c7;
      color: #92400e;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-user {
      background: #e0e7ff;
      color: #3730a3;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: #9ca3af;
    }
    .empty-state p { font-size: 16px; margin-top: 8px; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .modal h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .modal .field {
      margin-bottom: 16px;
    }
    .modal .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .modal .field input,
    .modal .field select,
    .modal .field textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .modal .field input:focus,
    .modal .field select:focus,
    .modal .field textarea:focus {
      border-color: #4361ee;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.12);
    }
    .modal .field textarea { resize: vertical; min-height: 80px; }
    .modal .field-row {
      display: flex;
      gap: 12px;
    }
    .modal .field-row .field { flex: 1; }
    .modal .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #f3f4f6;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 14px 20px;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }
    .toast.success { background: #059669; }
    .toast.error { background: #dc2626; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.7);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }
    .loading-overlay.show { display: flex; }
    .loading-spinner-lg {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-radius: 50%;
      border-top-color: #4361ee;
      animation: spin 0.7s linear infinite;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .topnav { padding: 0 16px; }
      .content { padding: 16px; }
      .modal { padding: 20px; }
      .modal .field-row { flex-direction: column; gap: 0; }
      .tabs .tab { padding: 12px 16px; font-size: 14px; }
      th, td { padding: 8px 10px; font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- ─── Login Page ─── -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <h1>Admin Panel</h1>
    <p class="subtitle">Sign in to manage vehicles and users</p>
    <div class="login-error" id="loginError"></div>
    <div class="field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<!-- ─── Dashboard Page ─── -->
<div class="dashboard-page" id="dashboardPage">
  <!-- Top Nav -->
  <div class="topnav">
    <div class="brand">🚗 <span>Admin</span>Panel</div>
    <div class="user-info">
      <span class="email" id="adminEmail"></span>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')" id="tab-users">👥 Users</div>
    <div class="tab" onclick="switchTab('vehicles')" id="tab-vehicles">🚙 Vehicles</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Users Panel -->
    <div class="panel active" id="panel-users">
      <div class="panel-header">
        <h2>Users <span class="badge" id="userCount">0</span></h2>
        <button class="btn btn-primary" onclick="openCreateUserModal()">+ New User</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Gender</th>
              <th>DOB</th>
              <th>Role</th>
              <th>Created</th>
              <th style="width:140px">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="7" class="empty-state"><p>Loading users...</p></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Vehicles Panel -->
    <div class="panel" id="panel-vehicles">
      <div class="panel-header">
        <h2>Vehicles <span class="badge" id="vehicleCount">0</span></h2>
        <button class="btn btn-primary" onclick="openCreateVehicleModal()">+ New Vehicle</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Brand</th>
              <th>Model</th>
              <th>Variant</th>
              <th>Type</th>
              <th>Price</th>
              <th>Created</th>
              <th style="width:110px">Actions</th>
            </tr>
          </thead>
          <tbody id="vehiclesTableBody">
            <tr><td colspan="8" class="empty-state"><p>Loading vehicles...</p></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- ─── Modal ─── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Create</h3>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ─── Toast ─── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ─── Loading ─── -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner-lg"></div>
</div>

<script>
  // ─── State ───
  const API = window.location.origin;
  let token = localStorage.getItem('adminToken') || '';
  let adminEmail = localStorage.getItem('adminEmail') || '';

  // Auto-login check
  if (token) { initDashboard(); }

  // ─── Utilities ───
  function $(id) { return document.getElementById(id); }

  function showLoading(show) {
    $('loadingOverlay').classList.toggle('show', show);
  }

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    $('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function api(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    return fetch(`${API}${path}`, { ...options, headers })
      .then(async res => {
        if (res.status === 401 || res.status === 403) {
          handleLogout();
          throw new Error('Session expired');
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Request failed');
        return data;
      });
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function formatDateTime(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  // ─── Auth ───
  function handleLogin() {
    const email = $('loginEmail').value.trim();
    const password = $('loginPassword').value.trim();
    const errorEl = $('loginError');
    const btn = $('loginBtn');

    if (!email || !password) { errorEl.textContent = 'Please enter email and password'; errorEl.classList.add('show'); return; }

    // Simple email format validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      errorEl.textContent = 'Please enter a valid email address (e.g., name@example.com)';
      errorEl.classList.add('show');
      return;
    }

    errorEl.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    }).then(data => {
      token = data.accessToken;
      adminEmail = data.user.email;
      localStorage.setItem('adminToken', token);
      localStorage.setItem('adminEmail', adminEmail);
      initDashboard();
    }).catch(err => {
      errorEl.textContent = err.message;
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  }

  function handleLogout() {
    token = '';
    adminEmail = '';
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminEmail');
    $('dashboardPage').classList.remove('active');
    $('loginPage').style.display = 'flex';
  }

  function initDashboard() {
    $('loginPage').style.display = 'none';
    $('dashboardPage').classList.add('active');
    $('adminEmail').textContent = adminEmail;
    loadUsers();
    loadVehicles();
  }

  // ─── Tab Switching ───
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    $(`tab-${tab}`).classList.add('active');
    $(`panel-${tab}`).classList.add('active');
  }

  // ─── Users CRUD ───
  function loadUsers() {
    api('/api/admin/users')
      .then(data => {
        const users = data.users || [];
        $('userCount').textContent = users.length;
        if (users.length === 0) {
          $('usersTableBody').innerHTML = '<tr><td colspan="7" class="empty-state"><p>No users found</p></td></tr>';
          return;
        }
        $('usersTableBody').innerHTML = users.map(u => `
          <tr>
            <td><strong>${esc(u.firstName)} ${esc(u.secondName)}</strong></td>
            <td>${esc(u.email)}</td>
            <td>${esc(u.gender)}</td>
            <td>${formatDate(u.dateOfBirth)}</td>
            <td>${u.isAdmin ? '<span class="badge-admin">Admin</span>' : '<span class="badge-user">User</span>'}</td>
            <td>${formatDateTime(u.createdAt)}</td>
            <td class="actions">
              <button class="btn btn-warning btn-sm" onclick="promoteUser('${u.id}', ${u.isAdmin})">${u.isAdmin ? 'Demote' : 'Promote'}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      })
      .catch(err => {
        $('usersTableBody').innerHTML = `<tr><td colspan="7" class="empty-state"><p>Error: ${esc(err.message)}</p></td></tr>`;
      });
  }

  function openCreateUserModal() {
    $('modalTitle').textContent = 'Create New User';
    $('modalBody').innerHTML = `
      <div class="field-row">
        <div class="field">
          <label>First Name</label>
          <input id="f-firstName" placeholder="John">
        </div>
        <div class="field">
          <label>Last Name</label>
          <input id="f-secondName" placeholder="Doe">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Email</label>
          <input id="f-email" type="email" placeholder="user@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="f-password" type="password" placeholder="Min 4 chars">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date of Birth</label>
          <input id="f-dob" type="date">
        </div>
        <div class="field">
          <label>Gender</label>
          <select id="f-gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Address</label>
        <input id="f-address" placeholder="123 Main St, City">
      </div>
      <div class="field" style="display:flex;align-items:center;gap:10px">
        <input id="f-isAdmin" type="checkbox" style="width:auto">
        <label for="f-isAdmin" style="margin:0;font-size:14px">Grant admin privileges</label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitCreateUser()">Create User</button>
      </div>
    `;
    $('modalOverlay').classList.add('open');
  }

  function submitCreateUser() {
    const data = {
      firstName: $('f-firstName').value.trim(),
      secondName: $('f-secondName').value.trim(),
      email: $('f-email').value.trim(),
      password: $('f-password').value,
      dateOfBirth: $('f-dob').value,
      gender: $('f-gender').value,
      address: $('f-address').value.trim(),
      isAdmin: $('f-isAdmin').checked,
    };
    if (!data.firstName || !data.secondName || !data.email || !data.password || !data.dateOfBirth || !data.address) {
      toast('Please fill all required fields', 'error'); return;
    }
    if (data.password.length < 4) { toast('Password must be at least 4 characters', 'error'); return; }

    showLoading(true);
    api('/api/admin/users', { method: 'POST', body: JSON.stringify(data) })
      .then(() => { closeModal(); toast('User created successfully'); loadUsers(); })
      .catch(err => toast(err.message, 'error'))
      .finally(() => showLoading(false));
  }

  function promoteUser(userId, isAdmin) {
    const action = isAdmin ? 'demote from admin' : 'promote to admin';
    if (!confirm(`Are you sure you want to ${action} this user?`)) return;

    showLoading(true);
    api(`/api/admin/users/${userId}`, { method: 'PUT', body: JSON.stringify({ isAdmin: !isAdmin }) })
      .then(() => { toast(`User ${isAdmin ? 'demoted' : 'promoted'} successfully`); loadUsers(); })
      .catch(err => toast(err.message, 'error'))
      .finally(() => showLoading(false));
  }

  function deleteUser(userId) {
    if (!confirm('Are you sure you want to delete this user? This cannot be undone.')) return;
    showLoading(true);
    api(`/api/admin/users/${userId}`, { method: 'DELETE' })
      .then(() => { toast('User deleted'); loadUsers(); })
      .catch(err => toast(err.message, 'error'))
      .finally(() => showLoading(false));
  }

  // ─── Vehicles CRUD ───
  function loadVehicles() {
    api('/api/admin/vehicles')
      .then(data => {
        const vehicles = data || [];
        $('vehicleCount').textContent = vehicles.length;
        if (vehicles.length === 0) {
          $('vehiclesTableBody').innerHTML = '<tr><td colspan="8" class="empty-state"><p>No vehicles found</p></td></tr>';
          return;
        }
        $('vehiclesTableBody').innerHTML = vehicles.map(v => `
          <tr>
            <td><strong>${esc(v.name)}</strong></td>
            <td>${esc(v.brand || '-')}</td>
            <td>${esc(v.model || '-')}</td>
            <td>${esc(v.variant || '-')}</td>
            <td>${esc(v.car_type || '-')}</td>
            <td>${esc(v.price)}</td>
            <td>${formatDateTime(v.created_at)}</td>
            <td class="actions">
              <button class="btn btn-warning btn-sm" onclick="openEditVehicleModal('${v.id}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteVehicle('${v.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      })
      .catch(err => {
        $('vehiclesTableBody').innerHTML = `<tr><td colspan="8" class="empty-state"><p>Error: ${esc(err.message)}</p></td></tr>`;
      });
  }

  function openCreateVehicleModal() {
    $('modalTitle').textContent = 'Create New Vehicle';
    $('modalBody').innerHTML = `
      <div class="field-row">
        <div class="field">
          <label>Name *</label>
          <input id="v-name" placeholder="Tata Nexon EV">
        </div>
        <div class="field">
          <label>Price *</label>
          <input id="v-price" placeholder="₹15 Lakh">
        </div>
      </div>
      <div class="field">
        <label>Description *</label>
        <textarea id="v-description" placeholder="Vehicle description..."></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Brand</label>
          <input id="v-brand" placeholder="Tata">
        </div>
        <div class="field">
          <label>Model</label>
          <input id="v-model" placeholder="Nexon">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Variant</label>
          <input id="v-variant" placeholder="EV">
        </div>
        <div class="field">
          <label>Type</label>
          <select id="v-car_type">
            <option value="suv">SUV</option>
            <option value="sedan">Sedan</option>
            <option value="hatchback">Hatchback</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Image URL</label>
        <input id="v-image" placeholder="https://example.com/car.jpg">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitCreateVehicle()">Create Vehicle</button>
      </div>
    `;
    $('modalOverlay').classList.add('open');
  }

  function submitCreateVehicle() {
    const data = {
      name: $('v-name').value.trim(),
      price: $('v-price').value.trim(),
      description: $('v-description').value.trim(),
      brand: $('v-brand').value.trim() || null,
      model: $('v-model').value.trim() || null,
      variant: $('v-variant').value.trim() || null,
      car_type: $('v-car_type').value,
      image: $('v-image').value.trim() || null,
    };
    if (!data.name || !data.price || !data.description) {
      toast('Please fill required fields (Name, Price, Description)', 'error'); return;
    }

    showLoading(true);
    api('/api/admin/vehicles', { method: 'POST', body: JSON.stringify(data) })
      .then(() => { closeModal(); toast('Vehicle created successfully'); loadVehicles(); })
      .catch(err => toast(err.message, 'error'))
      .finally(() => showLoading(false));
  }

  function openEditVehicleModal(vehicleId) {
    showLoading(true);
    // Fetch current vehicle data from the list
    const row = document.querySelector(`#vehiclesTableBody tr td`); // simple approach: load fresh from API
    api('/api/admin/vehicles').then(vehicles => {
      const v = vehicles.find(c => c.id === vehicleId);
      if (!v) { toast('Vehicle not found', 'error'); showLoading(false); return; }

      $('modalTitle').textContent = 'Edit Vehicle';
      $('modalBody').innerHTML = `
        <div class="field-row">
          <div class="field">
            <label>Name *</label>
            <input id="v-name" value="${esc(v.name)}">
          </div>
          <div class="field">
            <label>Price *</label>
            <input id="v-price" value="${esc(v.price)}">
          </div>
        </div>
        <div class="field">
          <label>Description *</label>
          <textarea id="v-description">${esc(v.description)}</textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Brand</label>
            <input id="v-brand" value="${esc(v.brand || '')}">
          </div>
          <div class="field">
            <label>Model</label>
            <input id="v-model" value="${esc(v.model || '')}">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Variant</label>
            <input id="v-variant" value="${esc(v.variant || '')}">
          </div>
          <div class="field">
            <label>Type</label>
            <select id="v-car_type">
              <option value="suv" ${v.car_type === 'suv' ? 'selected' : ''}>SUV</option>
              <option value="sedan" ${v.car_type === 'sedan' ? 'selected' : ''}>Sedan</option>
              <option value="hatchback" ${v.car_type === 'hatchback' ? 'selected' : ''}>Hatchback</option>
              <option value="other" ${v.car_type === 'other' || !v.car_type ? 'selected' : ''}>Other</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Image URL</label>
          <input id="v-image" value="${esc(v.image || '')}">
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitEditVehicle('${vehicleId}')">Update Vehicle</button>
        </div>
      `;
      showLoading(false);
      $('modalOverlay').classList.add('open');
    }).catch(err => { toast(err.message, 'error'); showLoading(false); });
  }

  function submitEditVehicle(vehicleId) {
    const data = {};
    const name = $('v-name').value.trim();
    const price = $('v-price').value.trim();
    const description = $('v-description').value.trim();
    const brand = $('v-brand').value.trim() || null;
    const model = $('v-model').value.trim() || null;
    const variant = $('v-variant').value.trim() || null;
    const car_type = $('v-car_type').value;
    const image = $('v-image').value.trim() || null;

    if (!name || !price || !description) {
      toast('Please fill required fields (Name, Price, Description)', 'error'); return;
    }

    // Only send non-null values
    data.name = name;
    data.price = price;
    data.description = description;
    if (brand !== null) data.brand = brand;
    if (model !== null) data.model = model;
    if (variant !== null) data.variant = variant;
    data.car_type = car_type;
    if (image !== null) data.image = image;

    showLoading(true);
    api(`/api/admin/vehicles/${vehicleId}`, { method: 'PUT', body: JSON.stringify(data) })
      .then(() => { closeModal(); toast('Vehicle updated successfully'); loadVehicles(); })
      .catch(err => toast(err.message, 'error'))
      .finally(() => showLoading(false));
  }

  function deleteVehicle(vehicleId) {
    if (!confirm('Are you sure you want to delete this vehicle? This cannot be undone.')) return;
    showLoading(true);
    api(`/api/admin/vehicles/${vehicleId}`, { method: 'DELETE' })
      .then(() => { toast('Vehicle deleted'); loadVehicles(); })
      .catch(err => toast(err.message, 'error'))
      .finally(() => showLoading(false));
  }

  // ─── Modal ───
  function closeModal() {
    $('modalOverlay').classList.remove('open');
  }
  $('modalOverlay').addEventListener('click', (e) => {
    if (e.target === $('modalOverlay')) closeModal();
  });

  // ─── Helpers ───
  function esc(str) {
    if (str == null) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  }

  // Enter key on login
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && $('loginPage').style.display !== 'none') handleLogin();
  });
</script>
</body>
</html>
